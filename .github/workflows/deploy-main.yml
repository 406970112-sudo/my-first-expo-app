name: Deploy main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          : "${DEPLOY_SSH_KEY:?Missing DEPLOY_SSH_KEY repository secret}"
          : "${DEPLOY_KNOWN_HOSTS:?Missing DEPLOY_KNOWN_HOSTS repository secret}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync source to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          REMOTE_RELEASE_DIR: /tmp/my-first-expo-app-${{ github.sha }}
        run: |
          : "${DEPLOY_HOST:?Missing DEPLOY_HOST repository secret}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER repository secret}"
          ssh \
            -i ~/.ssh/deploy_key \
            -p "${DEPLOY_PORT:-22}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "rm -rf '$REMOTE_RELEASE_DIR' && mkdir -p '$REMOTE_RELEASE_DIR/source'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${DEPLOY_PORT:-22} -o BatchMode=yes -o ConnectTimeout=15" \
            --exclude='.git/' \
            --exclude='.expo-web.err.log' \
            --exclude='.expo-web.log' \
            --exclude='frontend/.env' \
            --exclude='backend/.env' \
            --exclude='email-agent-backend/.env' \
            --exclude='frontend/node_modules/' \
            --exclude='backend/bin/' \
            --exclude='email-agent-backend/node_modules/' \
            --exclude='email-agent-backend/dist/' \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_RELEASE_DIR/source/"

      - name: Update production server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          REMOTE_RELEASE_DIR: /tmp/my-first-expo-app-${{ github.sha }}
        run: |
          : "${DEPLOY_HOST:?Missing DEPLOY_HOST repository secret}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER repository secret}"
          ssh \
            -i ~/.ssh/deploy_key \
            -p "${DEPLOY_PORT:-22}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo -n bash -lc 'set -Eeuo pipefail; APP_ROOT=/srv/my-first-expo-app; rsync -a --delete --exclude=.git/ --exclude=frontend/.env --exclude=backend/.env --exclude=email-agent-backend/.env \"$REMOTE_RELEASE_DIR/source/\" \"\$APP_ROOT/\"; cd \"\$APP_ROOT\"; SKIP_GIT_UPDATE=1 DEPLOY_COMMIT=${{ github.sha }} BRANCH=main bash deploy/alicloud/ubuntu-22.04/update-server.sh; rm -rf \"$REMOTE_RELEASE_DIR\"'"
