name: Deploy main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          : "${DEPLOY_SSH_KEY:?Missing DEPLOY_SSH_KEY repository secret}"
          : "${DEPLOY_KNOWN_HOSTS:?Missing DEPLOY_KNOWN_HOSTS repository secret}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Update production server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          : "${DEPLOY_HOST:?Missing DEPLOY_HOST repository secret}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER repository secret}"
          ssh \
            -i ~/.ssh/deploy_key \
            -p "${DEPLOY_PORT:-22}" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo -n bash -lc 'cd /srv/my-first-expo-app && git fetch origin main && git checkout main && git merge --ff-only origin/main && bash deploy/alicloud/ubuntu-22.04/update-server.sh'"
